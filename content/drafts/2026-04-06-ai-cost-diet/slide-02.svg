<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="'JetBrains Mono', monospace">
  <rect width="1080" height="1350" fill="#0B0F19"/>
  <text x="60" y="120" fill="#6B7280" font-size="26">the problem</text>
  <text x="60" y="240" fill="#F7F5EF" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="80">The Opus tax.</text>
  <text x="60" y="340" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="500" font-size="38">Most teams reach for the most expensive</text>
  <text x="60" y="390" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="500" font-size="38">model by default — even for tasks Haiku</text>
  <text x="60" y="440" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="500" font-size="38">could finish in 200ms.</text>

  <!-- 3 model cards -->
  <g transform="translate(60,580)">
    <rect width="300" height="220" rx="14" fill="#1A2030" stroke="#FF6B5C" stroke-width="3"/>
    <text x="150" y="70" fill="#F7F5EF" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="48" text-anchor="middle">Haiku</text>
    <text x="150" y="120" fill="#6B7280" font-size="26" text-anchor="middle">$1 / $5 per Mtok</text>
    <text x="150" y="180" fill="#FF6B5C" font-size="26" text-anchor="middle">— skipped —</text>
  </g>
  <g transform="translate(390,580)">
    <rect width="300" height="220" rx="14" fill="#1A2030" stroke="#FF6B5C" stroke-width="3"/>
    <text x="150" y="70" fill="#F7F5EF" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="48" text-anchor="middle">Sonnet</text>
    <text x="150" y="120" fill="#6B7280" font-size="26" text-anchor="middle">$3 / $15 per Mtok</text>
    <text x="150" y="180" fill="#FF6B5C" font-size="26" text-anchor="middle">— skipped —</text>
  </g>
  <g transform="translate(720,580)">
    <rect width="300" height="220" rx="14" fill="#1A2030" stroke="#3DD5F3" stroke-width="4"/>
    <text x="150" y="70" fill="#F7F5EF" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="48" text-anchor="middle">Opus</text>
    <text x="150" y="120" fill="#6B7280" font-size="26" text-anchor="middle">$5 / $25 per Mtok</text>
    <text x="150" y="180" fill="#3DD5F3" font-size="26" text-anchor="middle">100% of traffic</text>
  </g>

  <text x="540" y="900" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="600" font-size="36" text-anchor="middle">All requests → Opus.</text>
  <text x="540" y="950" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="600" font-size="36" text-anchor="middle">You're paying 5× for tasks 1× would handle.</text>

  <text x="60" y="1300" fill="#6B7280" font-size="22">hidden costs · 01</text>
  <text x="1020" y="1300" fill="#6B7280" font-size="22" text-anchor="end">02 / 07</text>
</svg>
