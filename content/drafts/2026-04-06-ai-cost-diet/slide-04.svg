<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="'JetBrains Mono', monospace">
  <rect width="1080" height="1350" fill="#0B0F19"/>
  <text x="60" y="120" fill="#6B7280" font-size="26">02 · don't repeat yourself</text>
  <text x="60" y="220" fill="#F7F5EF" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="76">Cache the prefix.</text>

  <g transform="translate(820,80)">
    <rect width="200" height="90" rx="14" fill="#F5D547"/>
    <text x="100" y="60" fill="#0B0F19" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="48" text-anchor="middle">−80%</text>
  </g>

  <!-- BEFORE -->
  <g transform="translate(60,340)">
    <text x="0" y="0" fill="#FF6B5C" font-size="24">without cache</text>
    <rect x="0" y="20" width="960" height="140" rx="14" fill="#1A2030" stroke="#FF6B5C" stroke-width="3"/>
    <rect x="20" y="50" width="700" height="80" rx="6" fill="#FF6B5C" opacity="0.25"/>
    <text x="370" y="100" fill="#FF6B5C" font-weight="700" font-size="28" text-anchor="middle">5K system prompt — reprocessed each request</text>
    <rect x="740" y="50" width="200" height="80" rx="6" fill="#1A2030" stroke="#6B7280" stroke-width="2"/>
    <text x="840" y="100" fill="#6B7280" font-size="22" text-anchor="middle">user msg</text>
    <text x="0" y="200" fill="#FF6B5C" font-weight="700" font-size="30">cost: 1.0× per request, every time</text>
  </g>

  <!-- AFTER -->
  <g transform="translate(60,640)">
    <text x="0" y="0" fill="#3DD5F3" font-size="24">with cache</text>
    <rect x="0" y="20" width="960" height="140" rx="14" fill="#1A2030" stroke="#3DD5F3" stroke-width="3"/>
    <rect x="20" y="50" width="700" height="80" rx="6" fill="#3DD5F3" opacity="0.25"/>
    <text x="370" y="92" fill="#3DD5F3" font-weight="700" font-size="26" text-anchor="middle">cached prefix · 0.1× cost</text>
    <text x="370" y="120" fill="#6B7280" font-size="20" text-anchor="middle">(written once at 1.25×)</text>
    <rect x="740" y="50" width="200" height="80" rx="6" fill="#1A2030" stroke="#6B7280" stroke-width="2"/>
    <text x="840" y="100" fill="#6B7280" font-size="22" text-anchor="middle">user msg</text>
    <text x="0" y="200" fill="#3DD5F3" font-weight="700" font-size="30">cost: 0.1× per read = 90% off</text>
  </g>

  <text x="60" y="980" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="600" font-size="32">Break-even after 1 read on the 5-min TTL.</text>
  <text x="60" y="1030" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="600" font-size="32">After 2 reads on the 1-hour TTL.</text>
  <text x="60" y="1100" fill="#6B7280" font-size="26">Bonus: TTFT drops 13–31% on cache hits.</text>

  <text x="60" y="1300" fill="#6B7280" font-size="22">hidden costs · 01</text>
  <text x="1020" y="1300" fill="#6B7280" font-size="22" text-anchor="end">04 / 07</text>
</svg>
