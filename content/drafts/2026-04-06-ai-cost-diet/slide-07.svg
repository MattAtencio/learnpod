<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="'JetBrains Mono', monospace">
  <rect width="1080" height="1350" fill="#0B0F19"/>
  <text x="60" y="120" fill="#6B7280" font-size="26">the cta</text>

  <text x="60" y="320" fill="#F7F5EF" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="80">I track 268 of</text>
  <text x="60" y="410" fill="#F7F5EF" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="80">these in</text>
  <text x="60" y="510" fill="#F5D547" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="120">LearnPod.</text>

  <text x="60" y="640" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="500" font-size="36">Free. Two-minute reads.</text>
  <text x="60" y="690" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="500" font-size="36">Connected by a knowledge graph.</text>

  <!-- CTA button -->
  <g transform="translate(60,820)">
