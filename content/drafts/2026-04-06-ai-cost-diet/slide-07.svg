    <text x="580" y="78" fill="#0B0F19" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="56" text-anchor="middle">→</text>
  </g>

  <!-- QR placeholder -->
  <g transform="translate(820,820)">
    <rect width="200" height="200" rx="10" fill="#F7F5EF"/>
    <rect x="20" y="20" width="160" height="160" fill="#0B0F19"/>
    <rect x="40" y="40" width="120" height="120" fill="#F7F5EF"/>
    <rect x="60" y="60" width="80" height="80" fill="#0B0F19"/>
