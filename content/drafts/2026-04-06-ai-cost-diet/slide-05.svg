<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="'JetBrains Mono', monospace">
  <rect width="1080" height="1350" fill="#0B0F19"/>
  <text x="60" y="120" fill="#6B7280" font-size="26">03 · wait for the discount</text>
  <text x="60" y="220" fill="#F7F5EF" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="76">Batch what can wait.</text>

  <g transform="translate(820,80)">
    <rect width="200" height="90" rx="14" fill="#F5D547"/>
    <text x="100" y="60" fill="#0B0F19" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="48" text-anchor="middle">−85%</text>
  </g>

  <!-- pipeline -->
  <g transform="translate(60,420)">
    <!-- 4 nodes with arrows -->
    <g>
      <rect width="200" height="120" rx="14" fill="#1A2030" stroke="#3DD5F3" stroke-width="3"/>
      <text x="100" y="55" fill="#3DD5F3" font-weight="800" font-size="30" text-anchor="middle">submit</text>
      <text x="100" y="90" fill="#6B7280" font-size="20" text-anchor="middle">≤100k req</text>
    </g>
    <path d="M 210 60 L 270 60" stroke="#3DD5F3" stroke-width="4" marker-end="url(#arr)"/>
    <g transform="translate(260,0)">
      <rect width="200" height="120" rx="14" fill="#1A2030" stroke="#3DD5F3" stroke-width="3"/>
      <text x="100" y="55" fill="#3DD5F3" font-weight="800" font-size="30" text-anchor="middle">queue</text>
      <text x="100" y="90" fill="#6B7280" font-size="20" text-anchor="middle">async</text>
    </g>
    <path d="M 470 60 L 530 60" stroke="#3DD5F3" stroke-width="4" marker-end="url(#arr)"/>
    <g transform="translate(520,0)">
      <rect width="200" height="120" rx="14" fill="#1A2030" stroke="#3DD5F3" stroke-width="3"/>
      <text x="100" y="55" fill="#3DD5F3" font-weight="800" font-size="30" text-anchor="middle">process</text>
      <text x="100" y="90" fill="#6B7280" font-size="20" text-anchor="middle">≤24 hr</text>
    </g>
    <path d="M 730 60 L 790 60" stroke="#3DD5F3" stroke-width="4" marker-end="url(#arr)"/>
    <g transform="translate(780,0)">
      <rect width="200" height="120" rx="14" fill="#1A2030" stroke="#3DD5F3" stroke-width="3"/>
      <text x="100" y="55" fill="#3DD5F3" font-weight="800" font-size="30" text-anchor="middle">results</text>
      <text x="100" y="90" fill="#6B7280" font-size="20" text-anchor="middle">29-day window</text>
    </g>
  </g>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L8,5 L0,10 z" fill="#3DD5F3"/>
    </marker>
  </defs>

  <!-- 50% off stamp -->
  <g transform="translate(380,640)">
    <rect width="320" height="120" rx="14" fill="#F5D547"/>
    <text x="160" y="55" fill="#0B0F19" font-family="'Inter Tight', sans-serif" font-weight="800" font-size="44" text-anchor="middle">FLAT 50% OFF</text>
    <text x="160" y="95" fill="#0B0F19" font-size="22" text-anchor="middle">input AND output</text>
  </g>

  <text x="60" y="900" fill="#F7F5EF" font-family="'Inter', sans-serif" font-weight="600" font-size="34">Use it for:</text>
  <text x="60" y="960" fill="#6B7280" font-size="28">→ nightly evals</text>
  <text x="60" y="1000" fill="#6B7280" font-size="28">→ classification jobs</text>
  <text x="60" y="1040" fill="#6B7280" font-size="28">→ content generation pipelines</text>
  <text x="60" y="1080" fill="#6B7280" font-size="28">→ anything where the user isn't waiting</text>

  <text x="60" y="1300" fill="#6B7280" font-size="22">hidden costs · 01</text>
  <text x="1020" y="1300" fill="#6B7280" font-size="22" text-anchor="end">05 / 07</text>
</svg>
